<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <radialGradient id="meshFade" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="white" stop-opacity="0.6"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <pattern id="meshPattern" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <mask id="meshMask">
      <rect width="800" height="800" fill="url(#meshFade)"/>
    </mask>
  </defs>
  <rect width="800" height="800" fill="url(#meshPattern)" mask="url(#meshMask)"/>
</svg>
