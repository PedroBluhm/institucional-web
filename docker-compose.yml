services:
  bluhmwerk-web:
    container_name: bluhmwerk-web
    build:
      context: .
      dockerfile: Dockerfile
    image: bluhmwerk-web:latest
    pull_policy: build
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-comercial@bluhmwerk.com}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-Bluhmwerk Site <site@bluhmwerk.com>}
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # HTTPS router (apex + www) — Traefik redireciona :80 -> :443 globalmente
      - "traefik.http.routers.bluhmwerk.rule=Host(`bluhmwerk.com`) || Host(`www.bluhmwerk.com`)"
      - "traefik.http.routers.bluhmwerk.entrypoints=websecure"
      - "traefik.http.routers.bluhmwerk.tls=true"
      - "traefik.http.routers.bluhmwerk.tls.certresolver=zerossl"
      - "traefik.http.routers.bluhmwerk.tls.domains[0].main=bluhmwerk.com"
      - "traefik.http.routers.bluhmwerk.tls.domains[0].sans=www.bluhmwerk.com"
      - "traefik.http.routers.bluhmwerk.service=bluhmwerk-svc"
      - "traefik.http.routers.bluhmwerk.middlewares=bluhmwerk-www,bluhmwerk-headers"

      # apex -> www (301)
      - "traefik.http.middlewares.bluhmwerk-www.redirectregex.regex=^https?://bluhmwerk\\.com/(.*)"
      - "traefik.http.middlewares.bluhmwerk-www.redirectregex.replacement=https://www.bluhmwerk.com/$${1}"
      - "traefik.http.middlewares.bluhmwerk-www.redirectregex.permanent=true"

      # backend (Next standalone roda na 3000 dentro do container)
      - "traefik.http.services.bluhmwerk-svc.loadbalancer.server.port=3000"

      # security headers
      - "traefik.http.middlewares.bluhmwerk-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.bluhmwerk-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.bluhmwerk-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.bluhmwerk-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.bluhmwerk-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.bluhmwerk-headers.headers.referrerPolicy=strict-origin-when-cross-origin"

networks:
  proxy:
    external: true
